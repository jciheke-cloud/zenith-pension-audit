name: Build & Verify Audit Portal

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Audit Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Production Bundle
        run: npm run build

      - name: Verify Dist Output
        run: test -f dist/index.html && echo "✅ Audit App production bundle successfully generated!"
