# Trigger automated CI/CD deployment to AWS S3 & CloudFront
name: Build, Verify & Deploy Audit Portal

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Audit Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Production Bundle
        run: npm run build

      - name: Verify Dist Output
        run: test -f dist/index.html && echo "✅ Audit App production bundle successfully generated!"

      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/main' && secrets.AWS_ACCESS_KEY_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Deploy Audit Portal to AWS S3
        if: github.ref == 'refs/heads/main' && secrets.AWS_ACCESS_KEY_ID != ''
        run: |
          aws s3 sync dist/ s3://riskintegra-erm-frontend-frontendbucket-xz3sjsennvjl/audit-portal/ --delete --cache-control "no-cache"
          aws s3 cp dist/index.html s3://riskintegra-erm-frontend-frontendbucket-xz3sjsennvjl/audit-portal/index.html --cache-control "no-cache, no-store, must-revalidate, max-age=0" --content-type "text/html"

      - name: Invalidate CloudFront Cache
        if: github.ref == 'refs/heads/main' && secrets.AWS_ACCESS_KEY_ID != ''
        run: |
          aws cloudfront create-invalidation --distribution-id E211U490INF7V3 --paths "/audit-portal/*" "/*"
