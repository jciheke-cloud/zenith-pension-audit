<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="zpcRedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="50%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#DC2626" flood-opacity="0.45" />
    </filter>
  </defs>
  <!-- Outer Institutional Shield Base -->
  <path d="M256 24 C130 38 48 60 48 168 C48 348 175 460 256 496 C337 460 464 348 464 168 C464 60 382 38 256 24 Z" fill="url(#zpcRedGrad)" filter="url(#glow)" stroke="#FECACA" stroke-width="12" />
  <!-- Inner Metallic Trim -->
  <path d="M256 56 C148 68 80 86 80 174 C80 330 186 428 256 460 C326 428 432 330 432 174 C432 86 364 68 256 56 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="8" />
  <!-- Center Gold Audit Seal Circle -->
  <circle cx="256" cy="225" r="92" fill="#0F172A" stroke="url(#goldHighlight)" stroke-width="10" />
  <!-- ZPC Audit Checkmark -->
  <path d="M214 265 L170 221 L192 199 L214 221 L300 135 L322 157 Z" fill="#10B981" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" />
  <!-- Bold ZPC Text -->
  <text x="256" y="396" font-family="'Inter', 'Arial Black', sans-serif" font-size="76" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="4" style="text-shadow: 0 4px 10px rgba(0,0,0,0.6);">ZPC</text>
  <text x="256" y="434" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="800" fill="#FDE047" text-anchor="middle" letter-spacing="2">AUDIT</text>
</svg>